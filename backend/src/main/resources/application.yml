server:
  port: 8080

spring:
  application:
    name: startrace-api

  # ===== 数据源 (PostgreSQL) =====
  datasource:
    url: jdbc:postgresql://localhost:5432/startrace
    username: startrace
    password: startrace_dev
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 10000

  # ===== Flyway 数据库迁移 =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  # ===== Redis =====
  data:
    redis:
      host: localhost
      port: 6380
      password: redis_dev
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # ===== Virtual Threads (JDK 21) =====
  threads:
    virtual:
      enabled: true

  # ===== Jackson =====
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ===== MyBatis-Plus =====
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ===== Sa-Token =====
sa-token:
  token-name: Authorization
  timeout: 7200                # 2小时
  active-timeout: 1800         # 30分钟无操作过期
  is-concurrent: true
  is-share: true
  token-style: random-64
  is-log: false
  # JWT 模式
  jwt-secret-key: ${JWT_SECRET:local-dev-jwt-secret-key-min-32-chars!!}

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ===== SpringDoc =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: false

# ===== 日志 =====
logging:
  level:
    com.startrace: DEBUG
    org.springframework.web: INFO
    org.flywaydb: INFO
