version: "3.9"

services:
  # ========== 数据库 ==========
  postgres:
    image: postgres:16-alpine
    container_name: startrace-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-startrace}
      POSTGRES_USER: ${POSTGRES_USER:-startrace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-startrace} -d ${POSTGRES_DB:-startrace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 缓存 ==========
  redis:
    image: redis:7-alpine
    container_name: startrace-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Spring Boot 应用 ==========
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: startrace-api:${APP_VERSION:-latest}
    container_name: startrace-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB: ${POSTGRES_DB:-startrace}
      POSTGRES_USER: ${POSTGRES_USER:-startrace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ========== 反向代理 ==========
  nginx:
    image: nginx:1.27-alpine
    container_name: startrace-nginx
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
